<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Search from Saved File</title>
    <script src="/static/js/scripts.js"></script>
    <link href="/static/css/styles.css" rel="stylesheet" />
</head>

<body>
    <div class="begin">
        <h1>Email Search from Saved File</h1>
        <p>From Google, Yandex, and other search engines.</p>
    </div>
    <div class="makeAndSendJson">
        <form name="get">
            <label for="inputKagent">Choose saved file with seaching by search engine:</label>
            <input type="file" name="getlink" id="inputKagent" onchange="loadLinksFromFile(this)">
            <input type="button" value="Begin processing" onclick="makeAndSendJSON(); resetFormAndOblLinksAndSetH3()">
        </form>

    </div>
    </div>
    <div class="makeTable">
        <h3>Table of results searching by query <span id="reqMessage"></span></h3>
        <table>
            <thead>
                <tr>
                    <th class="emails">Emails</th>
                    <th>URL</th>
                </tr>
            </thead>
            <tbody id="resultsOfSearching">

            </tbody>
        </table>
    </div>
</body>

</html>
