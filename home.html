<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск email по сохранённому поисковому файлу</title>
    <style>
        span.validationError {
            color: red;
        }

        body {
            background-color: #f5f3f0;
        }

        table {
            margin-left: 20px;
            margin-right: 20px;
            border: thin solid black;
            caption-side: bottom;
            border-collapse: collapse;
        }

        td,
        th {
            border: thin dotted gray;
            padding: 5px;
        }

        caption {
            font-style: italic;
            padding-top: 8px;
        }

        th {
            background-color: #d4d3d1;
        }

        td {
            background-color: #f1ede8;
        }

        td.emails {
            width: 30%;
        }
    </style>
</head>

<body>
    <div class="begin">
        <h1>Поиск email по сохранённому поисковому файлу</h1>
    </div>
    <div class="makeAndSendJson">
        <h3>Создание JSON из сохранённого поискового класса</h3>
        <form name="get">
            <label for="inputKagent">Выберите сохраннённый поиск в google или яндекс:</label>
            <input type="file" name="getlink" id="inputKagent" onchange="loadLinksFromFile(this)">
            <input type="button" value="Begin processing" onclick="makeAndSendJSON(); resetForm()">
        </form>
        <div id="request"></div>
        <div id="manylinks">

        </div>
        <script>
            let objLinks = {
                strrequest: '',
                links: []
            }
            function loadLinksFromFile(input) {
                const file = input.files[0];
                const reader = new FileReader();

                reader.onload = function (e) {
                    const html = e.target.result;

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    let links = doc.querySelectorAll('a');
                    let reqs = doc.querySelectorAll('input')

                    if (links) {
                        getHref(links)
                    } else {
                        alert('В файле не найдена таблица');
                    }
                    if (reqs) {
                        getRequest(reqs)
                    } else {
                        alert('Не нашёл input')
                    }
                };

                reader.onerror = () => alert('Ошибка чтения файла');
                reader.readAsText(file);
            }
            function getHref(links) {
                let arrayLinks = []
                links.forEach(element => {
                    if (element.href && !element.href.includes('yandex')
                        && !element.href.includes('google')
                        && !element.href.includes('ya.ru')
                        && !element.href.includes('127.0.0.1')
                        && !element.href.includes('localhost')) {
                        arrayLinks.push(element.href)
                    }
                });
                objLinks.links = arrayLinks
            }
            function getRequest(inputs) {
                let strRequest = ''
                inputs.forEach(input => {
                    if (input.value) {
                        strRequest += input.value
                    }
                });
                objLinks.strrequest = strRequest
            }
            function makeAndSendJSON() {
                let strJson = JSON.stringify(objLinks)
                sendJSONgetResult(strJson)
            }
            function resetForm() {
                const fileInput = document.getElementById('inputKagent');
                fileInput.value = '';
            }
            async function sendJSONgetResult(json) {
                let resp = await fetch('/postlinks', {
                    method: 'Post',
                    headers: {
                        'Content-Type': 'application/json;charset=utf-8'
                    },
                    body: json
                });
                if (!resp.ok) {
                    alert('Ошибка: ' + resp.status);
                    return;
                }
                let result = await resp.json();
                makeTableOfResults(result)
            }
        </script>
    </div>
    <div class="makeTable">
        <h3>Таблица резутатов поиска по запросу</h3>
        <table>
            <thead>
                <tr>
                    <th class="emails">Емайлы</th>
                    <th>Линк</th>
                </tr>
            </thead>
            <tbody id="resultsOfSearching">

            </tbody>
        </table>
        <script>
            function makeTableOfResults(arrayResults) {
                let tbody = document.getElementById('resultsOfSearching')
                for (let i = 0; i < arrayResults.length; i++) {
                    let tr = document.createElement('tr')
                    tbody.append(tr)
                    let tdEmails = document.createElement('td')
                    let tdUrl = document.createElement('td')
                    const element = arrayResults[i];
                    makeEmailsLinks(tdEmails, element.emails)
                    tdEmails.classList.add('emails')
                    tr.append(tdEmails)
                    makeUrlLink(tdUrl, element.url)
                    tr.append(tdUrl)
                }
            }
            function makeEmailsLinks(td, emails) {
                if (emails === null) {
                    td.append(emails)
                } else {
                    td.innerHTML = emails
                        .map(email => `<a href="mailto:${email}?subject=Заявка">${email}</a>`)
                        .join(', ');
                }
            }
            function makeUrlLink(td, url) {
                td.innerHTML = `<a href="${url}" target="_blank">${url}</a>`
            }
        </script>
    </div>
</body>

</html>
